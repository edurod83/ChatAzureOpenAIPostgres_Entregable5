# ============================================================
# CI/CD Pipeline — Azure AI Chat
# ============================================================
# Triggers: push a main, pull requests a main
#
# Secrets requeridos en GitHub (Settings → Secrets → Actions):
#   AZURE_USERNAME   – Usuario administrador del Azure Container Registry
#   AZURE_PASSWORD   – Contraseña del Azure Container Registry
#   ACR_LOGIN_SERVER – Servidor del ACR, p.ej. miacr.azurecr.io
#
# Despliegue manual en ACI (ejecutar tras el pipeline):
#   az container create \
#     --resource-group <rg> --name chatazureopenai-container \
#     --image <acr>.azurecr.io/chatazureopenai-backend:latest \
#     --registry-login-server <acr>.azurecr.io \
#     --registry-username <acr-user> --registry-password <acr-pass> \
#     --dns-name-label chatazureopenai-unir --ports 8000 \
#     --location westeurope \
#     --secure-environment-variables \
#         DATABASE_URL="..." AZURE_OPENAI_ENDPOINT="..." \
#         AZURE_OPENAI_API_KEY="..." AZURE_OPENAI_DEPLOYMENT="..." \
#         AZURE_OPENAI_API_VERSION="2024-12-01-preview"
# ============================================================

name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  IMAGE_NAME: chatazureopenai-backend

jobs:
  # ────────────────────────────────────────────────────────────
  # 1. PRUEBAS UNITARIAS
  # ────────────────────────────────────────────────────────────
  test:
    name: Pruebas unitarias
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Ejecutar tests
        run: python -m pytest tests/ -v --tb=short

  # ────────────────────────────────────────────────────────────
  # 2. CONSTRUIR Y SUBIR IMAGEN A ACR
  # ────────────────────────────────────────────────────────────
  build-and-push:
    name: Build & Push a ACR
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Login en Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.AZURE_USERNAME }}
          password: ${{ secrets.AZURE_PASSWORD }}

      - name: Construir y subir imagen Docker
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest
            ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
